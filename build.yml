name: Build Patalix Calculator APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up NodeJS Environment
      uses: actions/setup-node@v4
      with:
        node-version: 18

    - name: Install Cordova Framework
      run: npm install -g cordova

    - name: Setup Java Development Kit (JDK 11)
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '11'

    - name: Setup Android SDK Tools
      uses: android-actions/setup-android@v3

    - name: Create Patalix Android Project
      run: |
        cordova create patalix_build com.patalix.calculator "Patalix Calculator"
        cd patalix_build
        cordova platform add android
        rm -rf www/*
        cp ../calculator.html www/index.html

    - name: Build Android Debug APK
      run: |
        cd patalix_build
        cordova build android --debug

    - name: Upload Finished Patalix APK
      uses: actions/upload-artifact@v4
      with:
        name: Patalix-Calculator-APK
        path: patalix_build/platforms/android/app/build/outputs/apk/debug/app-debug.apk
